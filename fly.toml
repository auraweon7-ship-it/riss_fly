# fly.toml app configuration file generated for riss-fly on 2026-04-27T06:45:06Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'riss-fly'
primary_region = 'sin'

[build]

[deploy]
  strategy = 'rolling'

[env]
  NODE_ENV = 'production'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '1m0s'
    timeout = '10s'
    grace_period = '30s'
    method = 'GET'
    path = '/health'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
